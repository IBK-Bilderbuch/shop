<!-- checkout.html -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/cart.css') }}">
<title>Bezahlung | I B K - Buchhandlung für Illustration und Bilderbücher</title>
<link rel="icon" type="image/x-icon" href="logo.png">
</head>
<body>
{% include 'navbar.html' %}

<section class="form">
  <h2>Bezahlung</h2>

  <div class="checkout-layout">
    <!-- Warenkorb -->
    <div class="checkout-cart">
      <h3>Ihre Bestellung</h3>
      {% include 'cart_component.html' %}
    </div>

    <!-- Checkout Formular -->
    <div class="checkout-form">
      <form id="checkout-form" method="POST" action="{{ url_for('checkout') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <h3>Lieferdaten</h3><br><br>

        <!-- Kundendaten -->
        <div class="half-container">
          <label><input type="text" name="vorname" required placeholder="Vorname"></label>
          <label><input type="text" name="nachname" required placeholder="Nachname"></label>
        </div>
        <label><input type="email" name="email" required placeholder="E-Mail"></label>
        <div class="half-container">
          <label><input type="text" name="strasse" required placeholder="Straße"></label>
          <label><input type="text" name="hausnummer" required placeholder="Hausnummer"></label>
        </div>
        <div class="drittel-container">
          <label class="drittel"><input type="text" name="plz" required placeholder="Postleitzahl"></label>
          <label class="drittel"><input type="text" name="stadt" required placeholder="Stadt"></label>
          <label class="drittel"><input type="text" name="land" required placeholder="Land"></label>
        </div>
        <label><input type="text" name="adresszusatz" placeholder="Adresszusatz"></label>
        <label><input type="text" name="telefon" required placeholder="Telefonnummer"></label>

        <!-- Datenschutz Checkbox -->
        <label class="privacy-consent">
          <input type="checkbox" name="privacy" id="privacy-checkbox" required>
          Ich habe die <a href="{{ url_for('datenschutz') }}" target="_blank">Datenschutzerklärung</a> gelesen und stimme ihr zu.
        </label>

        <!-- PayPal Button Container -->
        <div id="paypal-button-container" style="margin-top: 20px;"></div>
      </form>
    </div>
  </div>
</section>

{% include 'footer.html' %}

<!-- PayPal JS SDK -->
<script src="https://www.paypal.com/sdk/js?client-id={{ config.PAYPAL_CLIENT_ID }}&currency=EUR"></script>
<script>
const privacyCheckbox = document.getElementById('privacy-checkbox');

function renderPayPalButton() {
  if (document.getElementById('paypal-button-container').children.length > 0) return;

  paypal.Buttons({
    onInit: function(data, actions) {
      actions.disable();
      privacyCheckbox.addEventListener('change', function() {
        if (this.checked) actions.enable();
        else actions.disable();
      });
    },
    createOrder: function(data, actions) {
      return fetch("/create-paypal-order", { method: "POST" })
        .then(res => res.json())
        .then(order => order.id);
    },
    onApprove: function(data, actions) {
      return fetch("/capture-paypal-order/" + data.orderID, { method: "POST" })
        .then(res => res.json())
        .then(res => {
          if(res.status === 'success') window.location.href = "/bestelldanke";
          else alert("Fehler bei PayPal-Zahlung.");
        });
    },
    onError: function(err) {
      console.error(err);
      alert("PayPal-Zahlung konnte nicht gestartet werden.");
    }
  }).render('#paypal-button-container');
}

renderPayPalButton();
</script>
<script src="{{ url_for('static', filename='js/cart.js') }}"></script>
</body>
</html>
